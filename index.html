<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./main.js" defer></script>
  </head>
  <body>
    <div class="mainContainer">
      <div class="screen">
        <div class="upper">3860 + 50000</div>
        <div class="lower">0</div>
      </div>
      <div class="keypad">
        <div class="row">
          <button class="btn btnLight">C</button>
          <button class="btn btnLight">AC</button>
          <button class="btn btnLight">%</button>
          <button class="btn btnOrange">÷</button>
        </div>
        <div class="row">
          <button class="btn btnDark">7</button>
          <button class="btn btnDark">8</button>
          <button class="btn btnDark">9</button>
          <button class="btn btnOrange">×</button>
        </div>
        <div class="row">
          <button class="btn btnDark">4</button>
          <button class="btn btnDark">5</button>
          <button class="btn btnDark">6</button>
          <button class="btn btnOrange">-</button>
        </div>
        <div class="row">
          <button class="btn btnDark">1</button>
          <button class="btn btnDark">2</button>
          <button class="btn btnDark">3</button>
          <button class="btn btnOrange">+</button>
        </div>
        <div class="row">
          <button class="btn btnDark">+/-</button>
          <button class="btn btnDark">0</button>
          <button class="btn btnDark">.</button>
          <button class="btn btnOrange">=</button>
        </div>
      </div>
    </div>
  </body>
</html>
